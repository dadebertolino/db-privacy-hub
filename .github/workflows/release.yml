name: Release

# L'auto-updater (DB_GitHub_Updater) legge /releases/latest e usa il PRIMO
# asset .zip trovato; in assenza di asset ripiega su zipball_url, che però ha
# la cartella radice sbagliata ({repo}-{hash}/ invece di db-privacy-hub/).
# Questo workflow garantisce quindi che ogni Release abbia SEMPRE uno ZIP
# costruito correttamente: cartella radice db-privacy-hub/, senza file di
# sviluppo (.github, phpcs.xml.dist, composer.json, ecc.).
#
# Uso: push di un tag v* (es. v1.6.0). Il workflow verifica che il tag
# corrisponda alla versione nel plugin header, builda lo ZIP e crea la
# Release con l'asset allegato.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches plugin version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(grep -oP '^\s*\*\s*Version:\s*\K[0-9.]+' db-privacy-hub.php)
          CONST_VERSION=$(grep -oP "define\( 'DBPH_VERSION',\s*'\K[0-9.]+" db-privacy-hub.php)
          echo "Tag: $TAG_VERSION — Header: $PLUGIN_VERSION — Costante: $CONST_VERSION"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ] || [ "$TAG_VERSION" != "$CONST_VERSION" ]; then
            echo "::error::Il tag ($TAG_VERSION) non corrisponde alla versione del plugin (header: $PLUGIN_VERSION, costante: $CONST_VERSION)."
            exit 1
          fi

      - name: Build plugin ZIP
        run: |
          mkdir -p build/db-privacy-hub
          rsync -a ./ build/db-privacy-hub/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude 'vendor' \
            --exclude 'node_modules' \
            --exclude 'composer.json' \
            --exclude 'composer.lock' \
            --exclude 'phpcs.xml.dist' \
            --exclude '.distignore' \
            --exclude '.gitignore' \
            --exclude '*.zip'
          cd build
          zip -r "db-privacy-hub.zip" db-privacy-hub
          unzip -l db-privacy-hub.zip | head -20

      - name: Create GitHub Release with asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/db-privacy-hub.zip
          generate_release_notes: true
          # Il body generato viene mostrato dall'updater nella scheda
          # "Dettagli versione" di WordPress (campo description).
